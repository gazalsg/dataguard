name: dataguard
version: "1.0.0"
description: >
  DataGuard puts an agent in the role of a Data Integrity Officer...
author: "GKK1"
tags:
  - data-cleaning
  - data-engineering
  - compliance
  - real-world
  - openenv

tasks:
  - id: task_easy
    name: easy
    description: >
      A 10-row customer table...
    difficulty: easy
    max_steps: 6
    reward_range: [0.0, 1.0]

  - id: task_medium
    name: medium
    description: >
      A 100-row user table...
    difficulty: medium
    max_steps: 10
    reward_range: [0.0, 1.0]

  - id: task_hard
    name: hard
    description: >
      A 500-row sales table...
    difficulty: hard
    max_steps: 18
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  description: >
    Structured snapshot of dataset...

action_space:
  type: object
  description: >
    One structured tool call per step...

reward_space:
  type: float
  range: [0.0, 1.0]
  description: >
    Deterministic Python grader, partial credit, retention penalty.

endpoints:
  - name: reset
    method: POST
    path: /reset
  - name: step
    method: POST
    path: /step
  - name: state
    method: POST
    path: /state
  - name: tasks
    method: GET
    path: /tasks
