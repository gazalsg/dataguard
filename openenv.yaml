name: dataguard
version: "1.0.0"
description: >
  DataGuard is an RL environment where an agent acts as a Data Integrity Officer.
  Given a corrupted CSV dataset and a schema specification, the agent must
  select tool actions to clean and validate the data — fixing dtypes, formats,
  duplicates, nulls, and unit inconsistencies — to maximise a deterministic
  compliance score.

author: "DataGuard Team"
tags:
  - data-cleaning
  - data-engineering
  - compliance
  - real-world
  - openenv

tasks:
  - name: easy
    description: "10 rows — fix name casing (UPPERCASE → Title Case) and date format (MM/DD/YYYY → YYYY-MM-DD)"
    difficulty: easy
    max_steps: 6
    reward_range: [0.0, 1.0]

  - name: medium
    description: "100 rows — remove duplicate rows, fill null emails, cast age column from float to int"
    difficulty: medium
    max_steps: 10
    reward_range: [0.0, 1.0]

  - name: hard
    description: "500 rows — convert mixed GBP/USD currency strings to USD floats, normalise 3 date formats, fix corrupted 8-char record IDs"
    difficulty: hard
    max_steps: 18
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  description: "Dataset summary: shape, per-column dtype/nulls/sample, schema requirements, available actions, reward so far, last action feedback"

action_space:
  type: object
  description: "Structured tool call — one of: fix_dtype, standardize_format, drop_duplicates, fill_nulls, convert_units, drop_rows, validate_schema"

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Deterministic schema compliance score returned on validate_schema().
    Partial progress signals are computed per column/issue class.
    A row-retention penalty of up to -0.20 applies if >10% of valid rows are dropped.

endpoints:
  reset: POST /reset
  step: POST /step
  state: POST /state
  tasks: GET  /tasks
